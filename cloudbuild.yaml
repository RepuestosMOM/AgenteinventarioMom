steps:
  # 1. Validar sintaxis Python
  - name: 'python:3.10-slim'
    id: CI-Syntax-Check
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt --quiet
        python -m py_compile main.py backend/agent.py backend/odoo_client.py
        echo "✅ Validación de sintaxis OK"

  # 2. Crear repositorio Artifact Registry si no existe
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Create-Artifact-Repo
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud artifacts repositories create mom-repo \
          --repository-format=docker \
          --location=us-central1 \
          --description="Agente Inventario MOM" \
          || echo "Repositorio ya existe, continuando..."

  # 3. Build de la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: Docker-Build
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mom-repo/agente-inventario:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mom-repo/agente-inventario:latest'
      - '.'

  # 4. Push imagen a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: Docker-Push
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mom-repo/agente-inventario'

  # 5. Deploy en Cloud Run con credenciales Odoo como env vars
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Cloud-Run-Deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'agente-inventario-srv'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mom-repo/agente-inventario:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--set-env-vars'
      - 'ODOO_URL=https://www.repuestosmom.cl,ODOO_DB=repuestosmom-mom-main-25810633,ODOO_USER=cio@repuestosmom.cl,ODOO_PASS=95512ac750d1fad3accc6b498a6490d9ef24f2f3,GCP_PROJECT=agente-inventario-mom,GCP_LOCATION=us-central1,GEMINI_MODEL=gemini-1.5-flash'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/mom-repo/agente-inventario:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/mom-repo/agente-inventario:latest'

timeout: '900s'
options:
  logging: CLOUD_LOGGING_ONLY
