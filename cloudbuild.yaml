steps:
  # 1. Instalar dependencias si las hubiera
  - name: 'python:3.10-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt

  # 2. Paso de validación/pruebas (Integración Continua)
  # Aquí verificaremos al menos que Python pueda compilar tu código de conexión con Odoo
  - name: 'python:3.10-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        python -m py_compile odoo_test.py
        echo "Validación de sintaxis completada con éxito."

  # TODO: 3. Paso de Despliegue (Continuous Deployment)
  # Este paso se habilitará cuando definas la infraestructura exacta en GCP (Cloud Run, Functions, etc)
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   entrypoint: gcloud
  #   args: ['run', 'deploy', 'agente-inventario', '--source', '.']

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY
